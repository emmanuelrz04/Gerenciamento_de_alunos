{% extends "base.html" %}

{% block title %}Calendário de Presenças{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>📅 Calendário de Presenças</h2>
        <a href="{{ url_for('presenca.visualizar_presencas') }}" class="btn btn-secondary">
            📊 Ver Relatório
        </a>
    </div>
    
    <div class="card-body">
        <!-- Filtro por aluno -->
        <div class="info-box">
            <label><strong>👨‍🎓 Selecionar Aluno:</strong></label>
            <select id="alunoSelect" class="form-control" style="margin-top: 0.5rem; width: auto; min-width: 250px;">
                <option value="todos">📋 Todos os Alunos</option>
                {% for aluno in alunos %}
                <option value="{{ aluno.id }}">{{ aluno.nome }} ({{ aluno.matricula }})</option>
                {% endfor %}
            </select>
        </div>
        
        <!-- Navegação do Mês -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 1.5rem 0;">
            <button onclick="mudarMes(-1)" class="btn btn-primary">◀ Mês Anterior</button>
            <h3 id="mesAtual" style="margin: 0; color: var(--gold);">Carregando...</h3>
            <button onclick="mudarMes(1)" class="btn btn-primary">Próximo Mês ▶</button>
        </div>
        
        <!-- Calendário -->
        <div id="calendario" style="overflow-x: auto;">
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--gray-300); border: 1px solid var(--gray-300);">
                <!-- Dias da semana serão inseridos via JS -->
            </div>
        </div>
        
        <!-- Legenda -->
        <div style="margin-top: 2rem; padding: 1rem; background: var(--gray-50); border-radius: var(--radius-lg);">
            <h4>📖 Legenda</h4>
            <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                <div><span style="display: inline-block; width: 20px; height: 20px; background: #4caf50; border-radius: 4px;"></span> Presente</div>
                <div><span style="display: inline-block; width: 20px; height: 20px; background: #f44336; border-radius: 4px;"></span> Falta</div>
                <div><span style="display: inline-block; width: 20px; height: 20px; background: #ff9800; border-radius: 4px;"></span> Falta Justificada</div>
                <div><span style="display: inline-block; width: 20px; height: 20px; background: #e0e0e0; border-radius: 4px;"></span> Não Registrado</div>
                <div><span style="display: inline-block; width: 20px; height: 20px; background: #fff3cd; border: 2px solid #ffc107;"></span> Hoje</div>
            </div>
        </div>
    </div>
</div>

<script>
    let dataAtual = new Date();
    let presencas = {};
let alunosList = [
    {% for aluno in alunos %}
    {
        id: {{ aluno.id }},
        nome: "{{ aluno.nome }}",
        matricula: "{{ aluno.matricula }}"
    }{% if not loop.last %},{% endif %}
    {% endfor %}
];    
    const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                   'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    
    async function carregarPresencas() {
        const alunoId = document.getElementById('alunoSelect').value;
        const ano = dataAtual.getFullYear();
        const mes = dataAtual.getMonth() + 1;
        
        try {
            const response = await fetch(`/presencas/api/presencas?aluno_id=${alunoId}&ano=${ano}&mes=${mes}`);
            const data = await response.json();
            presencas = data;
            renderizarCalendario();
        } catch (error) {
            console.error('Erro:', error);
            renderizarCalendario();
        }
    }
    
    function renderizarCalendario() {
        const ano = dataAtual.getFullYear();
        const mes = dataAtual.getMonth();
        
        // Atualizar título
        document.getElementById('mesAtual').innerHTML = `${meses[mes]} ${ano}`;
        
        const primeiroDia = new Date(ano, mes, 1);
        const ultimoDia = new Date(ano, mes + 1, 0);
        const diasNoMes = ultimoDia.getDate();
        const primeiroDiaSemana = primeiroDia.getDay();
        
        let html = '';
        
        // Cabeçalho dos dias da semana
        for (let i = 0; i < 7; i++) {
            html += `<div style="background: var(--primary); color: white; padding: 0.75rem; text-align: center; font-weight: bold;">
                        ${diasSemana[i]}
                    </div>`;
        }
        
        // Dias vazios do início
        for (let i = 0; i < primeiroDiaSemana; i++) {
            html += `<div style="background: var(--gray-100); padding: 1rem; min-height: 80px; text-align: center; color: var(--gray-400);">
                        <div style="font-weight: bold;"></div>
                    </div>`;
        }
        
        // Dias do mês
        const hoje = new Date();
        const hojeStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
        
        for (let dia = 1; dia <= diasNoMes; dia++) {
            const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
            const isHoje = dataStr === hojeStr;
            
            let bgColor = '#ffffff';
            let statusText = '';
            let statusColor = '';
            
            if (presencas[dataStr]) {
                if (presencas[dataStr].presente) {
                    bgColor = '#c8e6c9';
                    statusText = '✓ Presente';
                    statusColor = '#2e7d32';
                } else if (presencas[dataStr].justificativa) {
                    bgColor = '#ffe0b2';
                    statusText = '📄 Falta Justificada';
                    statusColor = '#f57c00';
                } else {
                    bgColor = '#ffcdd2';
                    statusText = '✗ Falta';
                    statusColor = '#c62828';
                }
            } else {
                bgColor = '#f5f5f5';
                statusText = '⭕ Não registrado';
                statusColor = '#9e9e9e';
            }
            
            html += `<div style="background: ${bgColor}; padding: 0.5rem; min-height: 80px; border: 1px solid #e0e0e0; ${isHoje ? 'border: 2px solid #ffc107;' : ''}">
                        <div style="font-weight: bold; font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--primary);">${dia}</div>
                        <div style="font-size: 0.7rem; color: ${statusColor};">${statusText}</div>
                    </div>`;
        }
        
        document.getElementById('calendario').innerHTML = `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e0e0e0;">${html}</div>`;
    }
    
    function mudarMes(delta) {
        dataAtual.setMonth(dataAtual.getMonth() + delta);
        carregarPresencas();
    }
    
    // Eventos
    document.getElementById('alunoSelect').addEventListener('change', () => {
        carregarPresencas();
    });
    
    // Inicializar
    carregarPresencas();
</script>
{% endblock %}
