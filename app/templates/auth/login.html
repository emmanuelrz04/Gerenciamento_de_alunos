<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço Saber | Login Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="margin: 0; font-family: 'Inter', sans-serif;">
    <div class="login-wrapper">
        <!-- Fundo com partículas -->
        <div class="login-bg" id="particles"></div>
        
        <!-- Card de Login Premium -->
        <div class="login-premium-card">
            <div class="login-premium-header">
                <div class="login-logo-premium"></div>
                <h2>Espaço Saber</h2>
                <p>Sistema de Controle de Presença</p>
            </div>
            
            <div class="login-premium-body">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="input-premium">
                        <label>📌 MATRÍCULA</label>
                        <div class="input-premium-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" 
                                   id="matricula" 
                                   name="matricula" 
                                   placeholder="Digite sua matrícula"
                                   required 
                                   autofocus>
                        </div>
                    </div>
                    
                    <div class="input-premium">
                        <label>🔒 SENHA</label>
                        <div class="input-premium-wrapper">
                            <span class="input-icon">🔑</span>
                            <input type="password" 
                                   id="senha" 
                                   name="senha" 
                                   placeholder="Digite sua senha"
                                   required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login-premium">
                         ACESSAR SISTEMA 
                    </button>
                </form>
                
                <div class="login-divider">
                    <span>ACESSO EXCLUSIVO</span>
                </div>
                
                <div class="access-premium">
                    <div class="access-premium-title">
                        <span>🏆</span>
                        <span>CREDENCIAIS DE ACESSO</span>
                    </div>
                    <div class="access-premium-grid">
                        <div class="access-premium-item">
                            <span class="access-premium-label">Matrícula:</span>
                            <span class="access-premium-value">PROF001</span>
                        </div>
                        <div class="access-premium-item">
                            <span class="access-premium-label">Senha:</span>
                            <span class="access-premium-value">admin123</span>
                        </div>
                    </div>
                    <div style="margin-top: 1rem; text-align: center; font-size: 0.75rem; color: #978F7E;">
                        Sistema de alta performance para gestão educacional
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Criar partículas animadas
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 6 + 2;
                const left = Math.random() * 100;
                const duration = Math.random() * 15 + 10;
                const delay = Math.random() * 20;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                
                container.appendChild(particle);
            }
        }
        
        // Efeito de digitação no campo de matrícula
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            
            const matriculaInput = document.getElementById('matricula');
            if (matriculaInput) {
                matriculaInput.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                matriculaInput.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            }
            
            // Animação de entrada dos itens
            const items = document.querySelectorAll('.access-premium-item');
            items.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateX(-20px)';
                setTimeout(() => {
                    item.style.transition = 'all 0.5s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateX(0)';
                }, index * 100 + 500);
            });
        });
    </script>
</body>
</html>
