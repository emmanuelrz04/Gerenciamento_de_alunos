{% extends "base.html" %}

{% block title %}Cadastrar Aluno - Espaço Saber{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h2>📝 Cadastrar Novo Aluno</h2>
                <p>Preencha os dados abaixo para adicionar um aluno ao sistema</p>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('aluno.cadastrar_aluno') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="form-group">
                        <label for="nome">👤 Nome Completo *</label>
                        <input type="text" class="form-control" id="nome" name="nome" 
                               placeholder="Digite o nome completo do aluno" required autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">📧 E-mail *</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="Digite o e-mail do aluno" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="matricula">🎓 Matrícula *</label>
                        <input type="text" class="form-control" id="matricula" name="matricula" 
                               placeholder="Digite a matrícula do aluno" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="senha">🔒 Senha *</label>
                        <input type="password" class="form-control" id="senha" name="senha" 
                               placeholder="Digite uma senha (mínimo 6 caracteres)" required>
                        <small class="form-text text-muted">Mínimo de 6 caracteres para segurança</small>
                    </div>
                    
                    <div class="btn-group" style="margin-top: 1rem;">
                        <button type="submit" class="btn btn-primary">💾 Salvar Aluno</button>
                        <a href="{{ url_for('aluno.listar_alunos') }}" class="btn btn-secondary">❌ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .col-md-8 {
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius-md);
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        border-color: var(--gold);
        outline: none;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    
    .btn-group {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
    }
    
    @media (max-width: 768px) {
        .btn-group {
            flex-direction: column;
        }
        
        .btn-group .btn {
            width: 100%;
        }
    }
</style>
{% endblock %}
